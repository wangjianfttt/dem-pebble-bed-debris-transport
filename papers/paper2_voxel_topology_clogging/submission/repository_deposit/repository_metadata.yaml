description: >
  Lightweight data and code deposit supporting a DEM-derived voxel-topology
  study of gas-driven fine-debris transport and retention in Li4SiO4 ceramic
  breeder pebble beds. The deposit contains manuscript source, processed source data,
  figure-generation scripts, exported figures, supplementary material,
  metadata audits, and shared DEM post-processing, voxel-topology and transport
  analysis utilities. Large raw DEM dump/restart files are documented as
  optional raw-archive material and may be deposited separately if repository
  size limits require it.
